services:
  authentication:
    build: .
    container_name: authentication
    restart: always
    env_file:
      - .env
    ports:
      - "8080:8080"
    depends_on:
      - mongodb
      - redis
      - rabbitmq
  redis:
    image: redis:latest
    container_name: redis
    restart: always
  rabbitmq:
    image: rabbitmq:latest
    container_name: rabbitmq
    restart: always
  mongodb:
    image: mongo:latest
    container_name: mongodb
    restart: always
