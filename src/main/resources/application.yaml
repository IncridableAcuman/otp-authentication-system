server:
  port: ${PORT}

spring:
  mail:
    host: smtp.gmail.com
    port: 587
    username: ${SMTP_USER}
    password: ${SMTP_PASS}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
  data:
    redis:
      host: redis #localhost
      port: 6379
#      username: admin
#      password: admin
    rabbitmq:
      host: rabbitmq # localhost
      port: 5672
      username: admin
      password: admin
    mongodb:
      host: localhost
      port: 27017
      database: ${DB_NAME}


jwt:
  secret: ${JWT_SECRET}
  access_time: ${JWT_ACCESS_VALIDITY}
  refresh_time: ${REFRESH_TOKEN_VALIDITY}